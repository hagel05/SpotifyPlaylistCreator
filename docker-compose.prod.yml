version: '3.8'

services:
  backend:
    image: ghcr.io/hagel05/cpb-backend:latest
    container_name: cpb-backend
    environment:
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET}
      SETLIST_FM_API_KEY: ${SETLIST_FM_API_KEY}
      SERVER_PORT: ${BACKEND_PORT:-30075}
      SPOTIFY_REDIRECT_URI: ${SPOTIFY_REDIRECT_URI}
    expose:
      - "${BACKEND_PORT:-30075}"
    networks:
      - cpb-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${BACKEND_PORT:-30075}/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: ghcr.io/hagel05/cpb-frontend:latest
    container_name: cpb-frontend
    environment:
      FRONTEND_PORT: ${FRONTEND_PORT:-30055}
      BACKEND_HOST: ${BACKEND_HOST:-cpb-backend}
      BACKEND_PORT: ${BACKEND_PORT:-30075}
    ports:
      - "${FRONTEND_PORT:-30055}:${FRONTEND_PORT:-30055}"
    networks:
      - cpb-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:${FRONTEND_PORT:-30055}/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  cpb-network:
    driver: bridge
